<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmarks</title>
  <style>
    :root {
      --bg: #1a1b26;
      --bg-elevated: #232433;
      --text: #e0e0e8;
      --text-dim: #9a9ab0;
      --text-faint: #8b8ba5;
      --accent: #a4b0ff;
      --accent-hover: #b9c2ff;
      --border: #2f3047;
      --danger: #ff8a8a;
      --danger-bg: #3a2a2a;
      --tag-bg: #2a2c40;
      --tag-text: #c0c4dd;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .hint {
      color: var(--text-faint);
      font-weight: normal;
    }

    .form-buttons {
      display: flex;
      gap: 0.5rem;
    }

    label {
      font-size: 0.85rem;
      color: var(--text-dim);
      font-weight: 500;
      margin-top: 0.25rem;
    }

    *:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 3px;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      max-width: 720px;
      margin: 2rem auto;
      padding: 0 1.25rem 4rem;
      line-height: 1.55;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
    }

    h1 {
      margin: 0 0 1.5rem 0;
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }

    input, textarea {
      padding: 0.55rem 0.7rem;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
      background: var(--bg-elevated);
      color: var(--text);
      transition: border-color 0.15s ease;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    textarea {
      resize: vertical;
      min-height: 4rem;
    }

    input::placeholder, textarea::placeholder {
      color: var(--text-faint);
    }

    button {
      padding: 0.5rem 1rem;
      font-size: 0.95rem;
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-elevated);
      color: var(--text);
      font-family: inherit;
      transition: background-color 0.15s ease, border-color 0.15s ease;
    }

    button:hover {
      background: var(--border);
    }

    .error {
      color: var(--danger);
      font-size: 0.9rem;
      min-height: 1.2em;
    }

    /* Form collapse toggle */
    .form-toggle {
      width: 100%;
      padding: 0.6rem;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      color: var(--accent);
      background: var(--bg-elevated);
      border: 1px dashed var(--border);
    }

    .form-toggle:hover {
      background: var(--border);
      border-style: solid;
    }

    /* Filter row */
    .filter-row {
      margin-bottom: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      flex: 1;
    }

    .search-input {
      padding: 0.45rem 0.7rem;
      padding-right: 2rem;
      font-size: 0.9rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-elevated);
      color: var(--text);
      min-width: 12rem;
      width: 100%;
    }

    .search-wrapper {
      position: relative;
      display: inline-block;
    }

    .search-clear {
      position: absolute;
      right: 0.4rem;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 1.2rem;
      line-height: 1;
      padding: 0.2rem 0.4rem;
      cursor: pointer;
      border-radius: 4px;
    }

    .search-clear:hover {
      color: var(--text);
      background: var(--border);
    }

    .filter-button {
      padding: 0.3rem 0.8rem;
      font-size: 0.85rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 999px;
      cursor: pointer;
      transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .filter-button:hover {
      background: var(--border);
      color: var(--text);
    }

    .filter-button.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    /* Bookmark list */
    .bookmark-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .bookmark {
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--border);
    }

    .bookmark-header {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .bookmark a {
      font-size: 1.05rem;
      font-weight: 500;
      text-decoration: none;
      color: var(--accent);
    }

    .bookmark a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    .bookmark-title-invalid {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text-dim);
      text-decoration: line-through;
    }

    .bookmark-domain {
      font-size: 0.8rem;
      color: var(--text-faint);
      font-family: ui-monospace, "SF Mono", monospace;
    }

    .bookmark-note {
      margin: 0.35rem 0 0 0;
      color: var(--text-dim);
      font-size: 0.95rem;
    }

    .bookmark-tags {
      margin-top: 0.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .tag-badge {
      display: inline-block;
      padding: 0.1rem 0.55rem;
      font-size: 0.78rem;
      background: var(--tag-bg);
      color: var(--tag-text);
      border: 1px solid transparent;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .tag-badge:hover {
      background: var(--border);
      color: var(--text);
      border-color: var(--accent);
    }

    .bookmark-actions {
      margin-top: 0.5rem;
      display: flex;
      gap: 0.5rem;
    }

    .icon-button {
      padding: 0.2rem 0.6rem;
      font-size: 0.82rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 4px;
      cursor: pointer;
    }

    .icon-button:hover {
      background: var(--bg-elevated);
      color: var(--text);
    }

    .icon-button.delete:hover {
      background: var(--danger-bg);
      border-color: var(--danger);
      color: var(--danger);
    }

    .edit-form {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .edit-actions {
      display: flex;
      gap: 0.5rem;
    }

    .empty {
      color: var(--text-faint);
      font-style: italic;
      padding: 1rem 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>Bookmarks</h1>

    <button type="button" class="form-toggle" id="form-toggle"
            aria-expanded="false" aria-controls="add-form">
      + Add bookmark
    </button>

    <form id="add-form" hidden aria-label="Add a new bookmark">
      <label for="url-input">URL</label>
      <input type="text" id="url-input" placeholder="https://example.com" required maxlength="2048">

      <label for="title-input">Title</label>
      <input type="text" id="title-input" placeholder="Title" required maxlength="200">

      <label for="note-input">Note <span class="hint">(optional)</span></label>
      <textarea id="note-input" placeholder="A short description" maxlength="1000"></textarea>

      <label for="tags-input">Tags <span class="hint">(optional, comma-separated)</span></label>
      <input type="text" id="tags-input" placeholder="rust, web, reference" maxlength="200">

      <div class="form-buttons">
        <button type="submit">Add</button>
        <button type="button" id="form-cancel">Cancel</button>
      </div>
      <div class="error" id="error-message" role="alert" aria-live="assertive"></div>
    </form>

    <div class="filter-row" role="search">
      <div class="filter-tags" id="filter-tags" role="group" aria-label="Filter by tag"></div>
      <div class="search-wrapper">
        <label for="search-input" class="visually-hidden">Search bookmarks</label>
        <input type="text" class="search-input" id="search-input"
               placeholder="Search…" aria-label="Search bookmarks">
        <button type="button" class="search-clear" id="search-clear" hidden
                aria-label="Clear search">×</button>
      </div>
    </div>

    <ul class="bookmark-list" id="bookmark-list" aria-live="polite" aria-label="Bookmarks"></ul>
  </main>

  <script>
    const STORAGE_KEY = 'bookmarks';
    let editingId = null;
    let activeTag = null;
    let searchQuery = '';

    function isValidBookmark(b) {
      return b
        && typeof b.id === 'string' && b.id.length > 0
        && typeof b.url === 'string' && b.url.length > 0
        && typeof b.title === 'string' && b.title.length > 0
        && typeof b.createdAt === 'number';
    }

    function normalizeBookmark(b) {
      // Coerce optional fields to safe defaults so older entries (from before
      // note/tags existed) don't break rendering. Also normalize tags to
      // lowercase + dedupe so existing data picks up the case-insensitive fix.
      const rawTags = Array.isArray(b.tags) ? b.tags.filter(t => typeof t === 'string') : [];
      const seen = new Set();
      const tags = [];
      for (const t of rawTags) {
        const lower = t.toLowerCase();
        if (lower.length === 0 || seen.has(lower)) continue;
        seen.add(lower);
        tags.push(lower);
      }
      return {
        ...b,
        note: typeof b.note === 'string' ? b.note : '',
        tags,
      };
    }

    function loadBookmarks() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      try {
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        const valid = [];
        let droppedCount = 0;
        for (const item of parsed) {
          if (isValidBookmark(item)) {
            valid.push(normalizeBookmark(item));
          } else {
            droppedCount++;
          }
        }
        if (droppedCount > 0) {
          console.warn(`Dropped ${droppedCount} malformed bookmark(s) on load.`);
        }
        return valid;
      } catch (e) {
        console.warn('Could not parse bookmarks from localStorage:', e);
        return [];
      }
    }

    function saveBookmarks(bookmarks) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks));
        return true;
      } catch (e) {
        console.error('Could not save bookmarks:', e);
        if (e.name === 'QuotaExceededError') {
          showError('Storage is full. Delete some bookmarks to make space.');
        } else {
          showError('Could not save bookmark. See browser console for details.');
        }
        return false;
      }
    }

    function deleteBookmark(id) {
      if (!confirm('Delete this bookmark?')) return;
      const bookmarks = loadBookmarks().filter(b => b.id !== id);
      if (saveBookmarks(bookmarks)) {
        render();
      }
    }

    function updateBookmark(id, updates) {
      const bookmarks = loadBookmarks();
      const idx = bookmarks.findIndex(b => b.id === id);
      if (idx === -1) return false;
      bookmarks[idx] = { ...bookmarks[idx], ...updates };
      return saveBookmarks(bookmarks);
    }

    function extractDomain(url) {
      try {
        const u = new URL(url);
        return u.hostname.replace(/^www\./, '');
      } catch {
        return '';
      }
    }

    function parseTags(input) {
      // Split, trim, lowercase, drop empties, dedupe within this bookmark.
      // Lowercasing keeps tags consistent with the case-insensitive search
      // and prevents "JavaScript" / "javascript" from fragmenting the taxonomy.
      const seen = new Set();
      const result = [];
      for (const raw of input.split(',')) {
        const tag = raw.trim().toLowerCase();
        if (tag.length === 0) continue;
        if (seen.has(tag)) continue;
        seen.add(tag);
        result.push(tag);
      }
      return result;
    }

    function renderDisplayMode(bookmark, li) {
      const header = document.createElement('div');
      header.className = 'bookmark-header';

      // Defense in depth: even though add/edit reject non-http(s) URLs,
      // re-validate at render time in case a malformed URL got into storage
      // (manual edit, future bug, etc.). If invalid, show as plain text.
      if (isValidUrl(bookmark.url)) {
        const link = document.createElement('a');
        link.href = bookmark.url;
        link.textContent = bookmark.title;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        header.appendChild(link);

        const domain = extractDomain(bookmark.url);
        if (domain) {
          const domainLabel = document.createElement('span');
          domainLabel.className = 'bookmark-domain';
          domainLabel.textContent = domain;
          header.appendChild(domainLabel);
        }
      } else {
        const titleSpan = document.createElement('span');
        titleSpan.className = 'bookmark-title-invalid';
        titleSpan.textContent = bookmark.title;
        header.appendChild(titleSpan);

        const warning = document.createElement('span');
        warning.className = 'bookmark-domain';
        warning.textContent = '(invalid URL)';
        header.appendChild(warning);
      }

      li.appendChild(header);

      if (bookmark.note) {
        const note = document.createElement('p');
        note.className = 'bookmark-note';
        note.textContent = bookmark.note;
        li.appendChild(note);
      }

      if (bookmark.tags && bookmark.tags.length > 0) {
        const tagsContainer = document.createElement('div');
        tagsContainer.className = 'bookmark-tags';
        for (const tag of bookmark.tags) {
          const badge = document.createElement('button');
          badge.type = 'button';
          badge.className = 'tag-badge';
          badge.textContent = tag;
          badge.setAttribute('aria-label', `Filter by tag: ${tag}`);
          badge.addEventListener('click', () => {
            activeTag = tag;
            render();
          });
          tagsContainer.appendChild(badge);
        }
        li.appendChild(tagsContainer);
      }

      const actions = document.createElement('div');
      actions.className = 'bookmark-actions';

      const editBtn = document.createElement('button');
      editBtn.className = 'icon-button';
      editBtn.innerHTML = '<span aria-hidden="true">✎</span> Edit';
      editBtn.setAttribute('aria-label', `Edit bookmark: ${bookmark.title}`);
      editBtn.addEventListener('click', () => {
        editingId = bookmark.id;
        render();
      });
      actions.appendChild(editBtn);

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'icon-button delete';
      deleteBtn.innerHTML = '<span aria-hidden="true">🗑</span> Delete';
      deleteBtn.setAttribute('aria-label', `Delete bookmark: ${bookmark.title}`);
      deleteBtn.addEventListener('click', () => deleteBookmark(bookmark.id));
      actions.appendChild(deleteBtn);

      li.appendChild(actions);
    }

    function renderEditMode(bookmark, li) {
      const form = document.createElement('form');
      form.className = 'edit-form';

      const urlField = document.createElement('input');
      urlField.type = 'text';
      urlField.value = bookmark.url;
      urlField.placeholder = 'https://example.com';
      urlField.maxLength = 2048;
      form.appendChild(urlField);

      const titleField = document.createElement('input');
      titleField.type = 'text';
      titleField.value = bookmark.title;
      titleField.placeholder = 'Title';
      titleField.maxLength = 200;
      form.appendChild(titleField);

      const noteField = document.createElement('textarea');
      noteField.value = bookmark.note || '';
      noteField.placeholder = 'A short description';
      noteField.maxLength = 1000;
      form.appendChild(noteField);

      const tagsField = document.createElement('input');
      tagsField.type = 'text';
      tagsField.value = (bookmark.tags || []).join(', ');
      tagsField.placeholder = 'Tags, comma-separated';
      tagsField.maxLength = 200;
      form.appendChild(tagsField);

      const errorDiv = document.createElement('div');
      errorDiv.className = 'error';
      errorDiv.setAttribute('role', 'alert');
      errorDiv.setAttribute('aria-live', 'assertive');
      form.appendChild(errorDiv);

      const actions = document.createElement('div');
      actions.className = 'edit-actions';

      const saveBtn = document.createElement('button');
      saveBtn.type = 'submit';
      saveBtn.className = 'icon-button';
      saveBtn.textContent = 'Save';
      actions.appendChild(saveBtn);

      const cancelBtn = document.createElement('button');
      cancelBtn.type = 'button';
      cancelBtn.className = 'icon-button';
      cancelBtn.textContent = 'Cancel';
      cancelBtn.addEventListener('click', () => {
        editingId = null;
        render();
      });
      actions.appendChild(cancelBtn);

      form.appendChild(actions);

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const newTitle = titleField.value.trim();
        const newUrl = urlField.value.trim();
        const newNote = noteField.value.trim();
        const newTags = parseTags(tagsField.value);

        if (!newTitle) {
          errorDiv.textContent = 'Title cannot be empty.';
          return;
        }
        if (!isValidUrl(newUrl)) {
          errorDiv.textContent = 'Enter a valid URL starting with http:// or https://';
          return;
        }

        const saved = updateBookmark(bookmark.id, {
          title: newTitle,
          url: newUrl,
          note: newNote,
          tags: newTags,
        });
        if (!saved) {
          errorDiv.textContent = 'Could not save changes. Storage may be full.';
          return;
        }
        editingId = null;
        render();
      });

      li.appendChild(form);
    }

    function renderFilters() {
      const filterRow = document.getElementById('filter-tags');
      const bookmarks = loadBookmarks();
      filterRow.innerHTML = '';

      // Collect all unique tags across all bookmarks
      const tagSet = new Set();
      for (const bookmark of bookmarks) {
        if (bookmark.tags) {
          for (const tag of bookmark.tags) {
            tagSet.add(tag);
          }
        }
      }
      const allTags = [...tagSet].sort();

      // "All" button
      const allBtn = document.createElement('button');
      allBtn.className = 'filter-button' + (activeTag === null ? ' active' : '');
      allBtn.textContent = 'All';
      allBtn.setAttribute('aria-pressed', activeTag === null ? 'true' : 'false');
      allBtn.addEventListener('click', () => {
        activeTag = null;
        render();
      });
      filterRow.appendChild(allBtn);

      // One button per unique tag
      for (const tag of allTags) {
        const btn = document.createElement('button');
        btn.className = 'filter-button' + (activeTag === tag ? ' active' : '');
        btn.textContent = tag;
        btn.setAttribute('aria-pressed', activeTag === tag ? 'true' : 'false');
        btn.addEventListener('click', () => {
          activeTag = tag;
          render();
        });
        filterRow.appendChild(btn);
      }
    }

    function render() {
      renderFilters();

      const list = document.getElementById('bookmark-list');
      const bookmarks = loadBookmarks();
      list.innerHTML = '';

      // If the active tag no longer exists on any bookmark (e.g., the last
      // bookmark with that tag was deleted), reset to All so we don't show
      // an empty list under a stale filter.
      if (activeTag !== null) {
        const tagStillExists = bookmarks.some(
          b => b.tags && b.tags.includes(activeTag)
        );
        if (!tagStillExists) {
          activeTag = null;
          renderFilters();
        }
      }

      // Apply tag filter
      let filtered = activeTag === null
        ? bookmarks
        : bookmarks.filter(b => b.tags && b.tags.includes(activeTag));

      // Apply search filter on top of tag filter
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(b => {
          const title = (b.title || '').toLowerCase();
          const note = (b.note || '').toLowerCase();
          const tagsHit = (b.tags || []).some(t => t.includes(q));
          return title.includes(q) || note.includes(q) || tagsHit;
        });
      }

      if (filtered.length === 0) {
        const empty = document.createElement('li');
        empty.className = 'empty';
        empty.textContent = bookmarks.length === 0
          ? 'No bookmarks yet. Add one above.'
          : 'No bookmarks match the current filter.';
        list.appendChild(empty);
        return;
      }

      // Newest first
      const sorted = [...filtered].sort((a, b) => b.createdAt - a.createdAt);

      for (const bookmark of sorted) {
        const li = document.createElement('li');
        li.className = 'bookmark';

        if (editingId === bookmark.id) {
          renderEditMode(bookmark, li);
        } else {
          renderDisplayMode(bookmark, li);
        }

        list.appendChild(li);
      }
    }

    function showError(message) {
      document.getElementById('error-message').textContent = message;
    }

    function clearError() {
      document.getElementById('error-message').textContent = '';
    }

    function isValidUrl(url) {
      let parsed;
      try {
        parsed = new URL(url);
      } catch {
        return false;
      }
      if (parsed.protocol !== 'http:' && parsed.protocol !== 'https:') return false;
      if (!parsed.hostname) return false;
      return true;
    }

    document.getElementById('add-form').addEventListener('submit', (e) => {
      e.preventDefault();
      clearError();

      const urlInput = document.getElementById('url-input');
      const titleInput = document.getElementById('title-input');
      const noteInput = document.getElementById('note-input');
      const tagsInput = document.getElementById('tags-input');

      const url = urlInput.value.trim();
      const title = titleInput.value.trim();
      const note = noteInput.value.trim();
      const tags = parseTags(tagsInput.value);

      if (!title) {
        showError('Title cannot be empty.');
        return;
      }

      if (!isValidUrl(url)) {
        showError('Enter a valid URL starting with http:// or https://');
        return;
      }

      const bookmarks = loadBookmarks();
      bookmarks.push({
        id: crypto.randomUUID(),
        url,
        title,
        note,
        tags,
        createdAt: Date.now(),
      });
      const saved = saveBookmarks(bookmarks);
      if (!saved) {
        // Don't clear the form or close it — user keeps their input to retry.
        return;
      }

      urlInput.value = '';
      titleInput.value = '';
      noteInput.value = '';
      tagsInput.value = '';
      closeAddForm();
      render();
    });

    function openAddForm() {
      document.getElementById('add-form').hidden = false;
      const toggle = document.getElementById('form-toggle');
      toggle.hidden = true;
      toggle.setAttribute('aria-expanded', 'true');
      document.getElementById('url-input').focus();
    }

    function closeAddForm() {
      document.getElementById('add-form').hidden = true;
      const toggle = document.getElementById('form-toggle');
      toggle.hidden = false;
      toggle.setAttribute('aria-expanded', 'false');
      clearError();
    }

    document.getElementById('form-toggle').addEventListener('click', openAddForm);
    document.getElementById('form-cancel').addEventListener('click', () => {
      // Clear the form on cancel so it's fresh next time
      document.getElementById('url-input').value = '';
      document.getElementById('title-input').value = '';
      document.getElementById('note-input').value = '';
      document.getElementById('tags-input').value = '';
      closeAddForm();
    });

    const searchInput = document.getElementById('search-input');
    const searchClear = document.getElementById('search-clear');

    searchInput.addEventListener('input', (e) => {
      searchQuery = e.target.value.trim();
      searchClear.hidden = e.target.value.length === 0;
      render();
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchQuery = '';
      searchClear.hidden = true;
      searchInput.focus();
      render();
    });

    render();
  </script>
</body>
</html>
